<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Marstek Venus Adapter Configuration</title>
    <link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
    <script type="text/javascript" src="../../lib/js/socket.io.js"></script>
    <script type="text/javascript" src="../../js/adapter-settings.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        .note { background: #e3f2fd; padding: 12px; border-radius: 4px; margin: 15px 0; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="m adapter-container">
        <h2>Marstek Venus Adapter Configuration</h2>
        <div class="note">
            <strong>Pre-requirements:</strong><br>
            1. Enable Open API in the official Marstek mobile app first<br>
            2. Note the configured UDP port (default: 30000)<br>
            3. Ensure device and ioBroker are on the same local network
        </div>
        <div class="form-group">
            <label><input type="checkbox" class="value" id="autoDiscovery" /> Auto discover devices on network</label>
        </div>
        <div class="form-group">
            <label for="ipAddress">Device IP Address</label>
            <input type="text" class="value" id="ipAddress" placeholder="192.168.1.xxx">
        </div>
        <div class="form-group">
            <label for="udpPort">UDP Port</label>
            <input type="number" class="value" id="udpPort" value="30000" min="1" max="65535">
        </div>
        <div class="form-group">
            <label for="pollInterval">Poll interval (ms)</label>
            <input type="number" class="value" id="pollInterval" value="10000" min="500" max="60000">
        </div>
        <button id="btn-discover">Discover Devices</button>
        <button id="btn-save">Save Settings</button>
        <div id="uiStatus" style="margin-top:10px;"></div>
    </div>

    <script>
        var socket = io.connect();
        var instance = window.location.pathname.split('/')[2].split('.')[1] + '.' + window.location.pathname.split('/')[2].split('.')[2];

        function showMessage(text, isError) {
            var status = document.getElementById('uiStatus');
            status.textContent = text;
            status.style.color = isError ? 'red' : 'green';
            setTimeout(function() { status.textContent = ''; }, 3000);
        }

        function load(settings, onChange) {
            if (!settings) return;
            document.querySelectorAll('.value').forEach(function(el) {
                var id = el.id;
                if (el.type === 'checkbox') {
                    el.checked = settings[id];
                } else {
                    el.value = settings[id] !== undefined ? settings[id] : '';
                }
            });

            if (typeof M !== 'undefined') M.updateTextFields();

            onChange(false);
        }

        function save(callback) {
            var obj = {};
            document.querySelectorAll('.value').forEach(function(el) {
                var id = el.id;
                if (el.type === 'checkbox') {
                    obj[id] = el.checked;
                } else if (el.type === 'number') {
                    obj[id] = parseFloat(el.value);
                } else {
                    obj[id] = el.value;
                }
            });
            callback(obj);
        }

        document.getElementById('btn-discover').addEventListener('click', function() {
            showMessage('Discovering devices...', false);
            document.getElementById('uiStatus').style.color = 'orange';
            sendTo(instance, 'discover', {}, function(response) {
                if (response && response.success) {
                    if (response.ipAddress) {
                        document.getElementById('ipAddress').value = response.ipAddress;
                        showMessage('Device found at ' + response.ipAddress, false);
                    } else {
                        showMessage('Discovery successful. No device found.', false);
                    }
                } else {
                    showMessage('Discovery failed', true);
                }
            });
        });

        document.getElementById('btn-save').addEventListener('click', function() {
            save(function(settings) {
                sendTo(instance, 'setSettings', settings, function(response) {
                    if (response && response.success) {
                        showMessage('Settings saved', false);
                    } else {
                        showMessage('Failed to save settings', true);
                    }
                });
            });
        });
    </script>
</body>
</html>
