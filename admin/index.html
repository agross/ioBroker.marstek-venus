<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Marstek Venus Adapter Configuration</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .note { background: #e3f2fd; padding: 12px; border-radius: 4px; margin: 15px 0; font-size: 0.9em; }
    </style>
</head>
<body>
    <h2>Marstek Venus Adapter Configuration</h2>
    
    <div class="note">
        <strong>Pre-requirements:</strong><br>
        1. Enable Open API in the official Marstek mobile app first<br>
        2. Note the configured UDP port (default: 30000)<br>
        3. Ensure device and ioBroker are on the same local network
    </div>
    
    <div class="form-group">
        <label><input type="checkbox" id="autoDiscovery"> Auto discover devices on network</label>
    </div>
    
    <div class="form-group">
        <label for="ipAddress">Device IP Address</label>
        <input type="text" id="ipAddress" placeholder="192.168.1.xxx">
    </div>
    
    <div class="form-group">
        <label for="udpPort">UDP Port</label>
        <input type="number" id="udpPort" value="30000" min="1" max="65535">
    </div>
    
    <div class="form-group">
        <label for="pollInterval">Poll interval (ms)</label>
        <input type="number" id="pollInterval" value="10000" min="500" max="60000">
    </div>
    
    <button onclick="discover()">🔍 Discover Devices</button>
    <button onclick="saveSettings()">💾 Save Settings</button>
    <div id="uiStatus" style="margin-top:10px;"></div>
    
    <script>
        function load() {
            window.parent.postMessage({
                command: 'sendTo',
                instance: 'marstek-venus.0',
                data: { command: 'getSettings' }
            }, '*');
        }
        
        let discoveryTimeout = null;

        function discover() {
            const status = document.getElementById('uiStatus');
            status.textContent = 'Discovering devices...';
            status.style.color = 'orange';
            window.parent.postMessage({
                command: 'sendTo',
                instance: 'marstek-venus.0',
                data: { command: 'discover' }
            }, '*');
            
            // Clear any existing timeout first
            if (discoveryTimeout) {
                clearTimeout(discoveryTimeout);
            }
            
            discoveryTimeout = setTimeout(() => {
                if (status.textContent === 'Discovering devices...') {
                    status.textContent = 'No response from adapter. Check logs.';
                    status.style.color = 'red';
                }
            }, 5000);
        }
        
        function save() {
            return {
                autoDiscovery: document.getElementById('autoDiscovery').checked,
                ipAddress: document.getElementById('ipAddress').value.trim(),
                udpPort: parseInt(document.getElementById('udpPort').value) || 30000,
                pollInterval: parseInt(document.getElementById('pollInterval').value) || 1000
            };
        }
        
        function saveSettings() {
            const settings = save();
            window.parent.postMessage({
                command: 'sendTo',
                instance: 'marstek-venus.0',
                data: { command: 'setSettings', values: settings }
            }, '*');
            localStorage.setItem('marstekVenusSettings', JSON.stringify(settings));
            const status = document.getElementById('uiStatus');
            status.textContent = 'Settings saved.';
            status.style.color = 'green';
            setTimeout(() => status.textContent = '', 3000);
        }
        
        window.addEventListener('message', (event) => {
            const msg = event.data;
            const status = document.getElementById('uiStatus');

            if (msg && msg.command === 'getSettings') {
                const saved = msg.values || {};
                document.getElementById('autoDiscovery').checked = saved.autoDiscovery ?? true;
                document.getElementById('ipAddress').value = saved.ipAddress || '';
                document.getElementById('udpPort').value = saved.udpPort || '30000';
                document.getElementById('pollInterval').value = saved.pollInterval || '10000';
                return;
            }

            if (msg && msg.command === 'setSettings') {
                const status = document.getElementById('uiStatus');
                if (msg.success) {
                    status.textContent = 'Settings saved to adapter.';
                    status.style.color = 'green';
                } else {
                    status.textContent = 'Failed to save settings.';
                    status.style.color = 'red';
                }
                setTimeout(() => status.textContent = '', 3000);
                return;
            }

            if (msg && msg.command === 'discover') {
                if (discoveryTimeout) {
                    clearTimeout(discoveryTimeout);
                    discoveryTimeout = null;
                }

                if (msg.success) {
                    if (msg.ipAddress) {
                        document.getElementById('ipAddress').value = msg.ipAddress;
                        status.textContent = `Device found at ${msg.ipAddress}, IP address populated.`;
                        status.style.color = 'green';
                    } else {
                        status.textContent = 'Discovery successful. No device found.';
                        status.style.color = 'blue';
                    }
                } else {
                    status.textContent = 'Discovery failed';
                    status.style.color = 'red';
                }
            }

            if (msg && msg.command === 'returnStatus') {
                if (discoveryTimeout) {
                    clearTimeout(discoveryTimeout);
                    discoveryTimeout = null;
                }

                if (msg.status === 'ok') {
                    if (msg.ipAddress) {
                        document.getElementById('ipAddress').value = msg.ipAddress;
                        status.textContent = `Device found at ${msg.ipAddress}, IP address populated.`;
                        status.style.color = 'green';
                    } else {
                        status.textContent = 'Discovery successful. No device found.';
                        status.style.color = 'blue';
                    }
                } else {
                    status.textContent = 'Discovery failed: ' + (msg.error || 'unknown error');
                    status.style.color = 'red';
                }
            }
        });
    </script>
</body>
</html>
